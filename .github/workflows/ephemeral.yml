name: PublicBot-ModularEngine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: public-bot-engine
  cancel-in-progress: true

jobs:
  bot-runtime:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Core CLI Dependencies
        run: |
          choco install yt-dlp ffmpeg imagemagick tailscale -y

      - name: Connect to Tailscale Network
        run: |
          $ts = if (Test-Path "$env:ProgramFiles\Tailscale\tailscale.exe") { "$env:ProgramFiles\Tailscale\tailscale.exe" } else { "${env:ProgramFiles(x86)}\Tailscale\tailscale.exe" }
          echo "TS_PATH=$ts" >> $env:GITHUB_ENV
          
          & $ts up --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="gh-runner-public-$env:GITHUB_RUN_ID" --accept-routes --unattended --reset
          Start-Sleep -Seconds 10
          
          $tsIP = & $ts ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Launch Public Bot Engine
        shell: pwsh
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
          REMOVEBG_KEY: ${{ secrets.REMOVEBG_API_KEY }}
        run: |
          ./core.ps1
          
